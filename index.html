<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3">
    <title>🎯 V22 - AUTO REFRESH</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:linear-gradient(135deg,#0a0a0f,#1a1a2e,#0f0f1a);min-height:100vh;padding:8px;color:#fff}
        .container{max-width:400px;margin:0 auto}
        
        .header{text-align:center;padding:12px;background:linear-gradient(145deg,rgba(0,255,136,0.2),rgba(0,200,100,0.05));border:3px solid #00ff88;border-radius:15px;margin-bottom:8px}
        .header h1{font-size:20px;color:#00ff88}
        .header p{font-size:9px;color:#00ff88;margin-top:4px}
        
        .refresh-bar{background:#1a1a2e;padding:8px;border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
        .refresh-bar .left{font-size:10px;color:#00ff88}
        .refresh-bar .right{font-size:10px;color:#888}
        .live-dot{display:inline-block;width:8px;height:8px;background:#00ff88;border-radius:50%;margin-right:5px;animation:blink 1s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
        
        .mode-box{padding:15px;border-radius:12px;text-align:center;margin-bottom:8px}
        .mode-box.opp{background:rgba(0,217,255,0.15);border:2px solid #00d9ff}
        .mode-box.same{background:rgba(255,0,255,0.15);border:2px solid #ff00ff}
        .mode-box.hybrid{background:rgba(255,215,0,0.15);border:2px solid #ffd700}
        .mode-icon{font-size:28px}
        .mode-name{font-size:16px;font-weight:bold;margin-top:5px}
        .mode-box.opp .mode-name{color:#00d9ff}
        .mode-box.same .mode-name{color:#ff00ff}
        .mode-box.hybrid .mode-name{color:#ffd700}
        .mode-desc{font-size:10px;color:#888;margin-top:3px}
        
        .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
        .stat{background:rgba(0,0,0,0.4);border-radius:8px;padding:10px 4px;text-align:center}
        .stat-val{font-size:22px;font-weight:bold}
        .stat-val.g{color:#00ff88}.stat-val.r{color:#ff5252}.stat-val.y{color:#ffd700}.stat-val.b{color:#00d9ff}
        .stat-lbl{font-size:7px;color:#666;text-transform:uppercase;margin-top:2px}
        
        .wrong-row{display:flex;justify-content:center;gap:8px;margin-bottom:8px}
        .w-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold}
        .w-dot.empty{background:rgba(255,255,255,0.05);border:2px dashed #333;color:#333}
        .w-dot.filled{background:#d32f2f;border:2px solid #f44336;color:#fff}
        .w-dot.safe{background:#388e3c;border:2px solid #4caf50;color:#fff}
        
        .results-row{display:flex;justify-content:center;gap:5px;margin-bottom:8px}
        .r-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold}
        .r-dot.c{background:#00c853}
        .r-dot.w{background:#d32f2f}
        .r-dot.e{background:rgba(255,255,255,0.05);color:#333}
        
        .voice-row{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px;background:rgba(0,217,255,0.08);border-radius:8px;margin-bottom:8px}
        .voice-row input{width:20px;height:20px;cursor:pointer}
        .voice-row span{font-size:12px}
        
        .pred-box{background:linear-gradient(145deg,#1a1a2e,#0f0f1a);border-radius:20px;padding:20px;text-align:center;margin-bottom:8px;border:3px solid rgba(255,255,255,0.1)}
        .pred-label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:2px}
        .pred-main{font-size:85px;font-weight:bold;margin:8px 0;line-height:1}
        .pred-main.big{color:#00ff88;text-shadow:0 0 50px rgba(0,255,136,0.6)}
        .pred-main.small{color:#ff5252;text-shadow:0 0 50px rgba(255,82,82,0.6)}
        .pred-main.wait{color:#333;font-size:16px}
        .pred-logic{font-size:10px;color:#888;padding:8px;background:rgba(0,0,0,0.4);border-radius:8px;margin-top:10px}
        .pred-logic strong{color:#ffd700}
        
        .pattern-show{display:flex;justify-content:center;gap:4px;flex-wrap:wrap;margin-top:10px}
        .p-item{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:11px;font-weight:bold}
        .p-item.b{background:#00a844}
        .p-item.s{background:#c62828}
        .p-item.n{background:linear-gradient(145deg,#ffd700,#ff8f00);color:#000;animation:pop 0.5s infinite}
        @keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
        
        .input-box{background:rgba(255,215,0,0.1);border:2px solid rgba(255,215,0,0.4);border-radius:12px;padding:10px;margin-bottom:8px}
        .input-row{display:flex;gap:8px}
        .inp{flex:1;padding:12px;font-size:22px;font-weight:bold;text-align:center;border:2px solid rgba(255,215,0,0.4);border-radius:10px;background:rgba(0,0,0,0.6);color:#fff;outline:none}
        .inp:focus{border-color:#ffd700}
        .add-btn{padding:12px 25px;font-size:18px;font-weight:bold;border:none;border-radius:10px;background:linear-gradient(145deg,#ffd700,#ff8f00);color:#000;cursor:pointer}
        
        .num-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:8px}
        .num-btn{height:55px;font-size:24px;font-weight:bold;border:none;border-radius:10px;cursor:pointer}
        .num-btn:active{transform:scale(0.9)}
        .num-btn.s{background:linear-gradient(145deg,#e53935,#b71c1c)}
        .num-btn.b{background:linear-gradient(145deg,#43a047,#2e7d32)}
        
        .action-row{display:flex;gap:8px;margin-bottom:8px}
        .action-btn{flex:1;padding:10px;font-size:11px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;background:rgba(255,255,255,0.03);color:#666;cursor:pointer}
        
        .history{background:rgba(0,0,0,0.25);border-radius:10px;padding:10px}
        .history-head{display:flex;justify-content:space-between;margin-bottom:6px}
        .history-title{font-size:10px;color:#00d9ff}
        .clear-btn{font-size:8px;padding:3px 8px;border:1px solid #ff5252;border-radius:4px;background:transparent;color:#ff5252;cursor:pointer}
        .history-list{display:flex;flex-wrap:wrap;gap:3px;max-height:40px;overflow-y:auto}
        .h-item{min-width:22px;height:18px;padding:0 4px;display:flex;align-items:center;justify-content:center;border-radius:3px;font-size:8px;font-weight:bold}
        .h-item.b{background:#2e7d32}.h-item.s{background:#c62828}
        .empty{color:#444;text-align:center;padding:8px;font-size:9px}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 V22 AUTO-SYNC</h1>
            <p>⚡ Auto Refresh 3s • No Glitch • Max 3 Wrong</p>
        </div>

        <!-- REFRESH BAR -->
        <div class="refresh-bar">
            <div class="left"><span class="live-dot"></span>LIVE SYNC</div>
            <div class="right" id="timeDisplay">--:--:--</div>
        </div>

        <!-- MODE -->
        <div id="modeBox" class="mode-box opp">
            <div id="modeIcon" class="mode-icon">↔️</div>
            <div id="modeName" class="mode-name">OPPOSITE</div>
            <div id="modeDesc" class="mode-desc">Predicting opposite of last</div>
        </div>

        <!-- STATS -->
        <div class="stats-row">
            <div class="stat"><div id="sC" class="stat-val g">0</div><div class="stat-lbl">Correct</div></div>
            <div class="stat"><div id="sW" class="stat-val r">0</div><div class="stat-lbl">Wrong</div></div>
            <div class="stat"><div id="sA" class="stat-val b">-</div><div class="stat-lbl">Accuracy</div></div>
            <div class="stat"><div id="sM" class="stat-val y">0</div><div class="stat-lbl">Max</div></div>
        </div>

        <!-- WRONG DOTS -->
        <div class="wrong-row">
            <div id="wd1" class="w-dot empty">1</div>
            <div id="wd2" class="w-dot empty">2</div>
            <div id="wd3" class="w-dot empty">3</div>
            <div id="wd4" class="w-dot safe">✓</div>
        </div>

        <!-- RESULTS -->
        <div id="resultsRow" class="results-row"></div>

        <!-- VOICE -->
        <div class="voice-row">
            <span>🔊</span>
            <input type="checkbox" id="voice">
            <span id="vLbl">OFF</span>
        </div>

        <!-- PREDICTION -->
        <div class="pred-box">
            <div class="pred-label">🎯 PREDICTION</div>
            <div id="predMain" class="pred-main wait">Add 3 Results</div>
            <div id="predLogic" class="pred-logic" style="display:none"></div>
            <div id="patternShow" class="pattern-show"></div>
        </div>

        <!-- INPUT -->
        <div class="input-box">
            <div class="input-row">
                <input type="text" id="inp" class="inp" placeholder="?" maxlength="4">
                <button class="add-btn" onclick="addNum()">ADD</button>
            </div>
        </div>

        <!-- NUMBER GRID -->
        <div class="num-grid">
            <button class="num-btn s" onclick="addNum('0')">0</button>
            <button class="num-btn s" onclick="addNum('1')">1</button>
            <button class="num-btn s" onclick="addNum('2')">2</button>
            <button class="num-btn s" onclick="addNum('3')">3</button>
            <button class="num-btn s" onclick="addNum('4')">4</button>
            <button class="num-btn b" onclick="addNum('5')">5</button>
            <button class="num-btn b" onclick="addNum('6')">6</button>
            <button class="num-btn b" onclick="addNum('7')">7</button>
            <button class="num-btn b" onclick="addNum('8')">8</button>
            <button class="num-btn b" onclick="addNum('9')">9</button>
        </div>

        <!-- ACTIONS -->
        <div class="action-row">
            <button class="action-btn" onclick="undoLast()">↩️ Undo</button>
            <button class="action-btn" onclick="clearAll()">🗑️ Clear</button>
        </div>

        <!-- HISTORY -->
        <div class="history">
            <div class="history-head">
                <span class="history-title">📜 History</span>
                <button class="clear-btn" onclick="clearAll()">Clear</button>
            </div>
            <div id="histList" class="history-list"></div>
        </div>
    </div>

    <script>
        // ========== SIMPLE HELPERS ==========
        const $=id=>document.getElementById(id);
        
        // ========== STATE (from localStorage) ==========
        let STATE = {
            data: [],           // [{num, cat}]
            results: [],        // [true/false]
            consecWrong: 0,
            mode: 'opp',        // 'opp' | 'same' | 'hybrid'
            stats: {c:0, w:0, max:0}
        };
        
        // ========== LOAD STATE ==========
        function loadState() {
            try {
                const saved = localStorage.getItem('v22state');
                if (saved) {
                    STATE = JSON.parse(saved);
                }
            } catch(e) {
                console.log('Load error:', e);
            }
        }
        
        // ========== SAVE STATE ==========
        function saveState() {
            try {
                localStorage.setItem('v22state', JSON.stringify(STATE));
            } catch(e) {
                console.log('Save error:', e);
            }
        }
        
        // ========== DETECT BIG/SMALL ==========
        function detect(n) {
            n = String(n).trim();
            const v = parseInt(n);
            if (n.length === 1) return v >= 5 ? 'B' : 'S';
            if (v >= 500) return 'B';
            if (v >= 100) return 'S';
            if (v >= 50) return 'B';
            if (v >= 10) return 'S';
            return v >= 5 ? 'B' : 'S';
        }
        
        // ========== GET PREDICTION ==========
        function getPrediction() {
            if (STATE.data.length < 3) return null;
            
            const len = STATE.data.length;
            const last = STATE.data[len-1].cat;
            const prev = STATE.data[len-2].cat;
            
            let pred, logic, mode;
            
            // HYBRID after 3 wrong
            if (STATE.consecWrong >= 3) {
                const last3 = STATE.data.slice(-3).map(d => d.cat);
                const bCount = last3.filter(c => c === 'B').length;
                pred = bCount >= 2 ? 'B' : 'S';
                logic = `🔒 HYBRID: Majority (${bCount}B/${3-bCount}S)`;
                mode = 'hybrid';
            }
            // SAME after 2 wrong
            else if (STATE.consecWrong === 2) {
                pred = last;
                logic = `🔄 FOLLOW: Same as last (2 wrong)`;
                mode = 'same';
            }
            // SWITCH after 1 wrong
            else if (STATE.consecWrong === 1) {
                pred = last;
                logic = `🔄 FOLLOW: Switching (1 wrong)`;
                mode = 'same';
            }
            // NORMAL: Check for streak or use opposite
            else {
                let streak = 1;
                for (let i = len-2; i >= 0; i--) {
                    if (STATE.data[i].cat === last) streak++;
                    else break;
                }
                
                if (streak >= 3) {
                    pred = last;
                    logic = `📈 STREAK ${streak}x: Following trend`;
                    mode = 'same';
                } else {
                    pred = last === 'B' ? 'S' : 'B';
                    logic = `↔️ OPPOSITE: Flip from ${last==='B'?'BIG':'SMALL'}`;
                    mode = 'opp';
                }
            }
            
            return { pred, logic, mode };
        }
        
        // ========== ADD NUMBER ==========
        function addNum(num) {
            // Get from input if not passed
            if (num === undefined) {
                num = $('inp').value.trim();
                $('inp').value = '';
            }
            
            if (!num || isNaN(num)) return;
            
            const cat = detect(num);
            
            // Check previous prediction
            if (STATE.data.length >= 3) {
                const prediction = getPrediction();
                if (prediction) {
                    if (prediction.pred === cat) {
                        // CORRECT
                        STATE.stats.c++;
                        STATE.consecWrong = 0;
                        STATE.results.push(true);
                    } else {
                        // WRONG
                        STATE.stats.w++;
                        STATE.consecWrong++;
                        STATE.stats.max = Math.max(STATE.stats.max, STATE.consecWrong);
                        STATE.results.push(false);
                    }
                    if (STATE.results.length > 30) STATE.results.shift();
                }
            }
            
            // Add to data
            STATE.data.push({ num, cat });
            
            // Save immediately
            saveState();
            
            // Render
            render();
        }
        
        // ========== UNDO ==========
        function undoLast() {
            if (STATE.data.length === 0) return;
            
            STATE.data.pop();
            
            if (STATE.results.length > 0) {
                const wasCorrect = STATE.results.pop();
                if (wasCorrect) {
                    STATE.stats.c--;
                } else {
                    STATE.stats.w--;
                }
            }
            
            // Recalculate consecWrong
            STATE.consecWrong = 0;
            for (let i = STATE.results.length - 1; i >= 0; i--) {
                if (!STATE.results[i]) STATE.consecWrong++;
                else break;
            }
            
            saveState();
            render();
        }
        
        // ========== CLEAR ALL ==========
        function clearAll() {
            if (STATE.data.length === 0) return;
            if (!confirm('Clear all data?')) return;
            
            STATE = {
                data: [],
                results: [],
                consecWrong: 0,
                mode: 'opp',
                stats: {c:0, w:0, max:0}
            };
            
            saveState();
            render();
        }
        
        // ========== RENDER ==========
        function render() {
            // Time
            const now = new Date();
            $('timeDisplay').textContent = now.toLocaleTimeString();
            
            // Mode
            const pred = getPrediction();
            const modeBox = $('modeBox');
            const modeIcon = $('modeIcon');
            const modeName = $('modeName');
            const modeDesc = $('modeDesc');
            
            if (pred) {
                modeBox.className = 'mode-box ' + pred.mode;
                if (pred.mode === 'opp') {
                    modeIcon.textContent = '↔️';
                    modeName.textContent = 'OPPOSITE';
                    modeDesc.textContent = 'Predicting opposite';
                } else if (pred.mode === 'same') {
                    modeIcon.textContent = '➡️';
                    modeName.textContent = 'FOLLOW';
                    modeDesc.textContent = 'Following trend';
                } else {
                    modeIcon.textContent = '🔒';
                    modeName.textContent = 'HYBRID';
                    modeDesc.textContent = 'Using majority';
                }
            }
            
            // Stats
            $('sC').textContent = STATE.stats.c;
            $('sW').textContent = STATE.stats.w;
            const total = STATE.stats.c + STATE.stats.w;
            $('sA').textContent = total ? Math.round((STATE.stats.c/total)*100)+'%' : '-';
            $('sM').textContent = STATE.stats.max;
            $('sM').className = 'stat-val ' + (STATE.stats.max <= 3 ? 'g' : 'r');
            
            // Wrong dots
            $('wd1').className = 'w-dot ' + (STATE.consecWrong >= 1 ? 'filled' : 'empty');
            $('wd2').className = 'w-dot ' + (STATE.consecWrong >= 2 ? 'filled' : 'empty');
            $('wd3').className = 'w-dot ' + (STATE.consecWrong >= 3 ? 'filled' : 'empty');
            
            // Results row
            const last6 = STATE.results.slice(-6);
            let dotsHtml = '';
            for (let i = 0; i < 6; i++) {
                if (i < last6.length) {
                    dotsHtml += `<div class="r-dot ${last6[i]?'c':'w'}">${last6[i]?'✓':'✗'}</div>`;
                } else {
                    dotsHtml += '<div class="r-dot e">-</div>';
                }
            }
            $('resultsRow').innerHTML = dotsHtml;
            
            // Voice
            const voiceOn = localStorage.getItem('v22voice') === 'true';
            $('voice').checked = voiceOn;
            $('vLbl').textContent = voiceOn ? 'ON' : 'OFF';
            $('vLbl').style.color = voiceOn ? '#00ff88' : '#888';
            
            // Prediction
            const pm = $('predMain');
            const pl = $('predLogic');
            
            if (STATE.data.length < 3) {
                pm.textContent = `Add ${3 - STATE.data.length} more`;
                pm.className = 'pred-main wait';
                pl.style.display = 'none';
            } else {
                pm.textContent = pred.pred === 'B' ? 'BIG' : 'SMALL';
                pm.className = 'pred-main ' + (pred.pred === 'B' ? 'big' : 'small');
                pl.style.display = 'block';
                pl.innerHTML = `<strong>Logic:</strong> ${pred.logic}`;
            }
            
            // Pattern
            const last10 = STATE.data.slice(-10);
            $('patternShow').innerHTML = last10.map(d => 
                `<div class="p-item ${d.cat==='B'?'b':'s'}">${d.num}</div>`
            ).join('') + (STATE.data.length >= 3 ? '<div class="p-item n">?</div>' : '');
            
            // History
            const hl = $('histList');
            if (STATE.data.length === 0) {
                hl.innerHTML = '<div class="empty">No data</div>';
            } else {
                hl.innerHTML = STATE.data.map(d => 
                    `<div class="h-item ${d.cat==='B'?'b':'s'}">${d.num}</div>`
                ).join('');
                hl.scrollTop = hl.scrollHeight;
            }
        }
        
        // ========== VOICE TOGGLE ==========
        $('voice').onchange = function() {
            localStorage.setItem('v22voice', this.checked);
            $('vLbl').textContent = this.checked ? 'ON' : 'OFF';
            $('vLbl').style.color = this.checked ? '#00ff88' : '#888';
        };
        
        // ========== ENTER KEY ==========
        $('inp').onkeypress = function(e) {
            if (e.key === 'Enter') addNum();
        };
        
        // ========== INIT ==========
        loadState();
        render();
        
        // Speak prediction on load (if voice on and prediction exists)
        setTimeout(function() {
            const voiceOn = localStorage.getItem('v22voice') === 'true';
            if (voiceOn && STATE.data.length >= 3) {
                const pred = getPrediction();
                if (pred) {
                    try {
                        speechSynthesis.cancel();
                        const u = new SpeechSynthesisUtterance(pred.pred === 'B' ? 'Big' : 'Small');
                        u.rate = 1;
                        u.lang = 'en-US';
                        speechSynthesis.speak(u);
                    } catch(e) {}
                }
            }
        }, 500);
    </script>
</body>
</html>
